site_name: Protokol Core
site_description: Ultra-lightweight, enterprise-grade LLM orchestration framework.
site_url: https://souvik666.github.io/protokol-core/
repo_url: https://github.com/souvik666/protokol-core
repo_name: souvik666/protokol-core
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
nav:
  - Overview: index.md
  - Quickstart: quickstart.md
  - API Reference:
      - Engine: reference/engine.md
      - Core: reference/core.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import os
            - import sys
            - sys.path.insert(0, os.path.abspath("src"))
          options:
            docstring_style: google
            show_root_heading: true
            heading_level: 2
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.superfences