name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  semantic-release:
    name: Version, tag, and publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release build

      - name: Ensure base tag exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION=$(grep -E '^version\s*=\s*"' pyproject.toml | head -n1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          if ! git rev-parse "v${CURRENT_VERSION}" >/dev/null 2>&1; then
            git tag "v${CURRENT_VERSION}" || true
            git push origin "v${CURRENT_VERSION}" || true
          fi

      - name: Determine previous tag
        id: prev_tag
        run: |
          git fetch --tags --force
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Run semantic-release
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release publish

      - name: Detect release output
        id: release_check
        run: |
          git fetch --tags --force
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          PREV_TAG="${{ steps.prev_tag.outputs.tag }}"
          if [ "$NEW_TAG" = "$PREV_TAG" ]; then
            echo "released=false" >> $GITHUB_OUTPUT
          else
            echo "released=true" >> $GITHUB_OUTPUT
            echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Sync release commit
        if: steps.release_check.outputs.released == 'true'
        run: |
          git pull --ff-only origin main

      - name: Build distributions
        if: steps.release_check.outputs.released == 'true'
        run: |
          python -m build

      - name: Publish to PyPI
        if: steps.release_check.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true
