name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Bump version and update changelog
        id: versioning
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import os
          import re
          
          pyproject = Path("pyproject.toml")
          text = pyproject.read_text(encoding="utf-8")
          pattern = r'(version\s*=\s*")([^"]+)(")'
          match = re.search(pattern, text)
          if not match:
              raise SystemExit("Could not find version in pyproject.toml")
          current_version = match.group(2)
          parts = current_version.split('.')
          if len(parts) < 3 or not all(part.isdigit() for part in parts):
              raise SystemExit(f"Unsupported version format: {current_version}")
          parts[-1] = str(int(parts[-1]) + 1)
          new_version = '.'.join(parts)
          pyproject.write_text(re.sub(pattern, rf'\g<1>{new_version}\g<3>', text, count=1), encoding="utf-8")
          
          init_path = Path("src/protokol/__init__.py")
          init_text = init_path.read_text(encoding="utf-8")
          init_text, count = re.subn(r'(__version__\s*=\s*")([^"]+)(")', rf'\g<1>{new_version}\g<3>', init_text, count=1)
          if count != 1:
              raise SystemExit("Could not update __version__ in src/protokol/__init__.py")
          init_path.write_text(init_text, encoding="utf-8")
          
          changelog = Path("CHANGELOG.md")
          entry = (
              f"## v{new_version} - {datetime.now(timezone.utc).strftime('%Y-%m-%d')}\n\n"
              f"- Automatic release for commit {os.environ['GITHUB_SHA'][:7]}\n\n"
          )
          if changelog.exists():
              changelog.write_text(entry + changelog.read_text(encoding="utf-8"), encoding="utf-8")
          else:
              changelog.write_text("# Changelog\n\n" + entry, encoding="utf-8")
          
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              print(f"previous={current_version}", file=fh)
              print(f"version={new_version}", file=fh)
          PY

      - name: Build distributions
        run: |
          rm -rf dist
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: false

      - name: Commit version bump and tag
        env:
          NEW_VERSION: ${{ steps.versioning.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/protokol/__init__.py CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(release): v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD:main
          git push origin "v${NEW_VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.versioning.outputs.version }}
        run: |
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --notes "Automated release for commit ${{ github.sha }}" \
            --latest
